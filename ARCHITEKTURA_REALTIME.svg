<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Architektura realtime</title>
  <desc id="desc">Przeplyw danych: VR i Kalman przekazuja dane do ComputeNode, backend laczy sie lokalnie z LLM, a RemoteGUI odbiera status i logi po HTTP oraz WebSocket.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#1f3b5f"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Arial', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Arial', sans-serif; fill: #334155; }
      .box-title { font: 700 24px 'Arial', sans-serif; fill: #0f172a; }
      .box-text { font: 400 18px 'Arial', sans-serif; fill: #1e293b; }
      .small { font: 400 16px 'Arial', sans-serif; fill: #475569; }
      .callout-title { font: 700 20px 'Arial', sans-serif; fill: #0f172a; }
      .callout-text { font: 400 17px 'Arial', sans-serif; fill: #1e293b; }
      .arrow-label { font: 700 18px 'Arial', sans-serif; fill: #1d4ed8; }
      .arrow-note { font: 400 16px 'Arial', sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text class="title" x="70" y="70">Architektura realtime</text>
  <text class="subtitle" x="70" y="104">Docelowy przeplyw: VR uruchamia sesje, Kalman streamuje klatki do backendu, backend pyta lokalny LLM, a RemoteGUI odbiera stan przez API i WebSocket.</text>

  <rect x="70" y="180" rx="26" ry="26" width="250" height="200" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text class="box-title" x="105" y="228">VR</text>
  <text class="box-text" x="105" y="270">- wybor tanca</text>
  <text class="box-text" x="105" y="300">- session_start</text>
  <text class="box-text" x="105" y="330">- session_end</text>
  <text class="small" x="105" y="360">Sygnal sterujacy do Kalman</text>

  <rect x="70" y="470" rx="26" ry="26" width="250" height="220" fill="#dcfce7" stroke="#4ade80" stroke-width="2" filter="url(#shadow)"/>
  <text class="box-title" x="105" y="518">Kalman</text>
  <text class="box-text" x="105" y="560">- odbiera sygnal startu</text>
  <text class="box-text" x="105" y="590">- po okolo 3 s</text>
  <text class="box-text" x="105" y="620">  zaczyna stream</text>
  <text class="box-text" x="105" y="650">- wysyla klatki UDP</text>

  <rect x="470" y="150" rx="30" ry="30" width="640" height="620" fill="#eff6ff" stroke="#93c5fd" stroke-width="3" filter="url(#shadow)"/>
  <text class="box-title" x="515" y="205">ComputeNode</text>
  <text class="small" x="515" y="235">Mocny komputer z backendem realtime i lokalnym LLM</text>

  <rect x="520" y="280" rx="22" ry="22" width="520" height="260" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="box-title" x="555" y="325">Backend realtime</text>
  <text class="box-text" x="555" y="365">1. odbior klatek UDP na porcie 5005</text>
  <text class="box-text" x="555" y="400">2. odbior sterowania sesja na porcie 5006</text>
  <text class="box-text" x="555" y="435">3. okna 4.0 s, stride 3.0 s</text>
  <text class="box-text" x="555" y="470">4. metryki ruchu i przygotowanie model inputs</text>
  <text class="box-text" x="555" y="505">5. zapis runtime i aktualizacja statusu</text>

  <rect x="570" y="580" rx="22" ry="22" width="420" height="140" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="box-title" x="605" y="625">LLM lokalny</text>
  <text class="box-text" x="605" y="665">HTTP localhost: 127.0.0.1:8000</text>
  <text class="box-text" x="605" y="695">zwrot: feedback tekstowy + score</text>

  <rect x="1230" y="210" rx="26" ry="26" width="280" height="240" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
  <text class="box-title" x="1265" y="258">RemoteGUI</text>
  <text class="box-text" x="1265" y="300">- status backendu</text>
  <text class="box-text" x="1265" y="330">- status LLM</text>
  <text class="box-text" x="1265" y="360">- ostatni feedback</text>
  <text class="box-text" x="1265" y="390">- logi i analiza runow</text>

  <rect x="1230" y="560" rx="26" ry="26" width="280" height="130" fill="#fff7ed" stroke="#fb923c" stroke-width="2" filter="url(#shadow)"/>
  <text class="box-title" x="1265" y="608">Feedback do VR</text>
  <text class="box-text" x="1265" y="648">Opcjonalny kanal zwrotny</text>

  <line x1="320" y1="255" x2="470" y2="255" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="335" y="235">UDP 5006</text>
  <text class="arrow-note" x="335" y="275">session_start / session_end</text>

  <line x1="320" y1="560" x2="470" y2="430" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="330" y="470">UDP 5005</text>
  <text class="arrow-note" x="330" y="495">klatki ruchu</text>
  <text class="arrow-note" x="330" y="520">docelowo lokalnie 127.0.0.1</text>

  <line x1="320" y1="290" x2="320" y2="510" stroke="#1f3b5f" stroke-width="3" marker-end="url(#arrow)" stroke-dasharray="10 10"/>
  <text class="arrow-label" x="336" y="398">sygnal startu</text>

  <line x1="780" y1="540" x2="780" y2="580" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="812" y="568">HTTP localhost:8000</text>

  <line x1="1110" y1="325" x2="1230" y2="325" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="1130" y="300">HTTP 8010</text>
  <text class="arrow-note" x="1130" y="345">snapshot / komendy</text>

  <line x1="1110" y1="385" x2="1230" y2="385" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="1130" y="425">WebSocket 8010</text>
  <text class="arrow-note" x="1130" y="450">logi, status, feedback</text>

  <line x1="1110" y1="625" x2="1230" y2="625" stroke="#1f3b5f" stroke-width="4" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="1130" y="600">opcjonalnie</text>

  <rect x="70" y="770" rx="24" ry="24" width="1440" height="150" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text class="callout-title" x="105" y="815">Timing pierwszego feedbacku</text>
  <text class="callout-text" x="105" y="855">Jesli Kalman startuje stream po okolo 3 s, a backend potrzebuje pierwszego pelnego okna 4 s, to pierwszy feedback pojawi sie po okolo 7 s + czas obliczen i odpowiedzi LLM.</text>
  <text class="callout-text" x="105" y="888">Kolejne odpowiedzi moga pojawiac sie mniej wiecej co 3 s + czas przetwarzania, bo stride backendu wynosi 3.0 s.</text>
</svg>
